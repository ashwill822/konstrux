workflows:
  ios-release:
    name: KONSTRUX iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.konstrux.app
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.konstrux.app"
        APP_STORE_APP_ID: "6770413821"
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Set up Capacitor iOS project
        script: |
          npx cap sync ios
          # Patch capacitor.config.json to register our local OAuthPlugin.
          # cap sync only adds npm-based plugins to packageClassList.
          # OAuthPlugin is a local Swift plugin, so we add it manually.
          CONFIG_JSON=$CM_BUILD_DIR/ios/App/App/capacitor.config.json
          python3 -c "
          import json, sys
          with open('$CONFIG_JSON') as f:
              cfg = json.load(f)
          if 'OAuthPlugin' not in cfg.get('packageClassList', []):
              cfg.setdefault('packageClassList', []).append('OAuthPlugin')
          with open('$CONFIG_JSON', 'w') as f:
              json.dump(cfg, f, indent='\t')
          print('Patched packageClassList:', cfg['packageClassList'])
          "
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Set bundle identifier
        script: |
          PLIST=$CM_BUILD_DIR/ios/App/App/Info.plist
          PLIST_BUDDY=/usr/libexec/PlistBuddy
          $PLIST_BUDDY -c "Set :CFBundleIdentifier $BUNDLE_ID" $PLIST
      - name: Set version and build number
        script: |
          PLIST=$CM_BUILD_DIR/ios/App/App/Info.plist
          PLIST_BUDDY=/usr/libexec/PlistBuddy
          $PLIST_BUDDY -c "Set :CFBundleShortVersionString 1.0.0" $PLIST
          BUILD_NUMBER=$(($(app-store-connect get-latest-testflight-build-number "$APP_STORE_APP_ID" --pre-release-version 1.0.0 2>/dev/null || echo 0) + 1))
          $PLIST_BUDDY -c "Set :CFBundleVersion $BUILD_NUMBER" $PLIST
      - name: Build iOS app
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
